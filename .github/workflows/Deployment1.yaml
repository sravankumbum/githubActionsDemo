name: githubActions_test1
run-name: Run tests
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: run tests
        run: npm run test
      - name: build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying code..."
  